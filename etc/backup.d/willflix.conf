# Willflix repo — system config, scripts, appdata, secrets
PATHS="/willflix"
KEEP_DAILY=14
KEEP_WEEKLY=8
KEEP_MONTHLY=24
OFFSITE=true

EXCLUDES="
# Git
.git

# Build artifacts / caches
**/node_modules
**/.next
**/__pycache__
**/.cache
**/Cache

# Logs (regenerable)
docker/logs
docker/appdata/**/logs
docker/appdata/**/logs.db*

# Postgres raw data — use pg_dump backups instead (live data files are
# unreliable to restore from a file copy anyway)
docker/appdata/postgres/data
docker/appdata/postgres/data.bak

# Redis AOF — authentik rebuilds state on restart
docker/appdata/redis

# Sonarr/Radarr media covers — re-downloaded from TVDB/TMDB
docker/appdata/*/MediaCover

# Sonarr/Radarr/Prowlarr backups dir — they make their own internal backups,
# but we already have the DBs via restic. Skip to save space.
docker/appdata/*/Backups

# Crash telemetry and runtime caches
docker/appdata/*/Sentry
docker/appdata/*/asp

# Nextcloud installed apps — re-downloaded on upgrade
docker/appdata/nextcloud/apps
docker/appdata/nextcloud/3rdparty

# Ofelia — disabled, stale data
docker/appdata/ofelia

# VNC — not actively used
docker/appdata/vnc
"
