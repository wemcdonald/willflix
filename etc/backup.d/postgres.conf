# PostgreSQL dumps — offsite backup of latest daily dump.
# Local retention is handled by backup_postgres (14 dated dirs).
# Restic retention gives us the long tail offsite (weekly/monthly).
PATHS="/Volumes/Bonus1/postgres-backup/latest"
KEEP_DAILY=7
KEEP_WEEKLY=8
KEEP_MONTHLY=24
OFFSITE=true

EXCLUDES=""
