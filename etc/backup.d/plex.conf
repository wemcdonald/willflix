# Plex — just the database and preferences for offsite backup.
# The full Plex SSD (including Cache/metadata) is handled by
# backup_plex (rsync to Bonus1) for fast local restore.
PATHS="/Volumes/Plex"
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=12
OFFSITE=true

EXCLUDES="
Plex Media Server/Cache
Plex Media Server/Codecs
Plex Media Server/Crash Reports
Plex Media Server/Diagnostics
Plex Media Server/Logs
Plex Media Server/Media
"
