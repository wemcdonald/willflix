# Plex SSD — database, metadata, preferences
# The local backup is large (~1TB) but worth keeping for fast restore.
# Offsite gets just the database (small, irreplaceable watch history).
PATHS="/Volumes/Plex"
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=12
OFFSITE=true

EXCLUDES="
Plex Media Server/Cache/Transcode
Plex Media Server/Cache/PhotoTranscoder
"
