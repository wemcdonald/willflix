# smartd.conf - Monitor all media and system drives by stable ATA ID
# Rewritten 2026-03-04 after MediaJ incident (device node shift caused smartd to lose tracking)
# Updated 2026-03-07: New MediaJ (was MediaSpare), new MediaC (was Parity3), new MediaParity3
#
# Config per drive:
#   -a              Monitor all attributes
#   -o on           Enable automatic offline testing
#   -S on           Enable attribute autosave
#   -n standby,q    Skip check if drive is in standby (quiet)
#   -s (S/../01/./02|L/../01/6/03)  Short self-test 1st of month 2am, Long 1st Saturday 3am
#   -W 4,45,55      Temp: report 4C change, warn at 45C, critical at 55C
#   -m root         Send alerts to root (sendmail-system maps to gmail)
#   -M exec /usr/share/smartmontools/smartd-runner

# === Data Drives ===
# MediaA - WDC WD120EMFZ 12TB
/dev/disk/by-id/ata-WDC_WD120EMFZ-11A6JA0_QGJ4J53T -a -o on -S on -n standby,q -s (S/../01/./02|L/../01/6/03) -W 4,45,55 -m root -M exec /usr/share/smartmontools/smartd-runner

