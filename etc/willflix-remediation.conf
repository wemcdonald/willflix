# willflix-remediation.conf — per-script LLM remediation config
#
# risk:
#   low    — LLM attempts fix; alert suppressed if verified fixed
#   medium — LLM attempts fix; alert ALWAYS sent with fix status appended
#   high   — LLM diagnoses only; diagnosis appended to alert; no changes made
#
# allowed_tools: Claude Code allowedTools syntax — enforced by the permission system.
#   Each entry is a glob pattern, e.g. "Bash(docker compose * restart sonarr)"
#
# verify_cmd: optional shell command to verify fix (default: re-run original script)

scripts:
  check_media_apps:
    risk: low
    goal: |
      Remediate stuck or failed Sonarr/Radarr/NZBGet queue items.
      Always read the queue first to understand current state before acting.

      SCENARIO: items stuck in importPending with "Caution: Found potentially dangerous file"
        1. Check the actual file on disk (DestDir from NZBGet history, or the folder in
           /Volumes/Media/Downloads/completed_nzb/Series/). Run `file` on it.
        2. If the file is a real video (MKV/MP4 magic bytes) just mislabelled — it's a
           false positive. Bulk-delete from Sonarr queue (removeFromClient=false,
           blocklist=false), then POST {"name":"DownloadedEpisodesScan"} to /command.
        3. If the file is a genuine PE32 executable with no video stream — it's a bad
           release. Delete it from disk, then POST {"name":"EpisodeSearch","episodeIds":[id]}
           for each affected episode so Sonarr grabs a clean copy.

      SCENARIO: queue item stuck with trackedDownloadStatus=warning, state=importPending,
      no dangerous-file message — usually a path mapping or permissions issue.
        Bulk-delete (removeFromClient=false) and trigger DownloadedEpisodesScan.
        If it re-queues with the same warning, restart sonarr.

      SCENARIO: PAR failure or move/unpack failure in history (not in current queue)
        These are already cleaned up by Sonarr. No action needed; just note in diagnosis.

      SCENARIO: downloadClientUnavailable for a queue item
        The download client (NZBGet/qBittorrent) is down or unreachable. Restart it.

      SCENARIO: app appears stuck (queue not updating, API slow/unresponsive)
        Restart the relevant container (sonarr/radarr/nzbget).

      Do not remove items with status=downloading or trackedDownloadState=downloading.
    allowed_tools:
      # Read queue/history/series/episode state
      - "Bash(curl -s http://localhost:8989/api/v3/queue*)"
      - "Bash(curl -s http://localhost:8989/api/v3/history*)"
      - "Bash(curl -s http://localhost:8989/api/v3/series*)"
      - "Bash(curl -s http://localhost:8989/api/v3/episode*)"
      - "Bash(curl -s http://localhost:8989/api/v3/manualimport*)"
      - "Bash(curl -s http://localhost:7878/api/v3/queue*)"
      - "Bash(curl -s http://localhost:7878/api/v3/history*)"
      - "Bash(curl -s http://localhost:7878/api/v3/movie*)"
      # Delete stuck queue items (keep files: removeFromClient=false)
      - "Bash(curl -s -X DELETE http://localhost:8989/api/v3/queue/*)"
      - "Bash(curl -s -X DELETE http://localhost:8989/api/v3/queue/bulk*)"
      - "Bash(curl -s -X DELETE http://localhost:7878/api/v3/queue/*)"
      - "Bash(curl -s -X DELETE http://localhost:7878/api/v3/queue/bulk*)"
      # Trigger Sonarr/Radarr commands (scan, search)
      - "Bash(curl -s -X POST http://localhost:8989/api/v3/command*)"
      - "Bash(curl -s -X POST http://localhost:7878/api/v3/command*)"
      # Delete bad executable-only releases from NZBGet staging area
      # (safe: this is temporary staging, not the media library)
      - "Bash(rm -rf /Volumes/Media/Downloads/completed_nzb/Series/*)"
      - "Bash(rm -rf /Volumes/Media/Downloads/completed_nzb/Movies/*)"
      # Container restarts
      - "Bash(docker compose -f /willflix/docker/compose.yml restart sonarr)"
      - "Bash(docker compose -f /willflix/docker/compose.yml restart radarr)"
      - "Bash(docker compose -f /willflix/docker/compose.yml restart nzbget)"

  willflix-check-services:
    risk: medium
    goal: |
      Restart stopped or crash-looping containers. Always check logs first.

      SCENARIO: container stopped, clean exit (exit code 0)
        Likely a graceful shutdown during an update. Just restart it.

      SCENARIO: container crash-looping (repeated restarts, exit code non-zero)
        Read the last 50 lines of logs. Look for config errors, missing files,
        or port conflicts. If it's a config parse error, report it — do not edit
        configs. If it's a transient error (DB lock, network timeout), restart once.

      SCENARIO: container stopped after a compose update
        Check if a sibling dependency is also down (e.g. postgres down → authentik
        fails). Fix the root dependency first, then restart dependents in order.

      SCENARIO: container unhealthy but running
        Check health endpoint via docker inspect. Restart if health checks are
        timing out due to a slow startup; report if health endpoint is returning errors.
    allowed_tools:
      - "Bash(docker compose -f /willflix/docker/compose.yml restart *)"
      - "Bash(docker compose -f /willflix/docker/compose.yml logs --tail=50 *)"
      - "Bash(docker inspect *)"

  update_containers:
    risk: medium
    goal: |
      Recover containers that failed to start after an image update.
      Always check logs before acting.

      SCENARIO: container exits immediately after update (exit code non-zero)
        Read logs. Common causes:
        - Config key renamed/removed in new version → report the specific key, do not edit.
        - DB schema migration required → report; some apps auto-migrate on restart, try once.
        - Port already in use → report; another container may need to be stopped first.

      SCENARIO: container starts but health check fails
        Restart once — new images sometimes need a longer startup window.
        If still unhealthy after restart, report the health endpoint error from logs.

      SCENARIO: container worked before update, now "image not found"
        The pull may have failed silently. Report — a manual `docker compose pull` is needed.

      SCENARIO: multiple containers failed in same update run
        Check if they share a dependency (network, postgres, redis). Fix the root service
        first. Report which containers need manual attention after the root is fixed.
    allowed_tools:
      - "Bash(docker compose -f /willflix/docker/compose.yml restart *)"
      - "Bash(docker compose -f /willflix/docker/compose.yml logs --tail=100 *)"
      - "Bash(docker inspect *)"

  check_mergerfs_health:
    risk: high
    goal: |
      Diagnose drive mount failures. Read-only investigation only — no remounting,
      no fsck, no writes of any kind.

      SCENARIO: drive NOT MOUNTED
        Check dmesg for kernel errors around that drive (look for "I/O error",
        "blk_update_request", "ata" errors). Check /proc/mounts to confirm absence.
        Report whether this looks like a cable/power failure (sudden disappearance)
        vs a filesystem error (remounted read-only first, then dropped).

      SCENARIO: drive MOUNTED BUT UNREADABLE (I/O error on ls)
        Almost certainly a hardware failure. Report SMART status — look for
        Reallocated_Sector_Ct, Pending_Sector, Uncorrectable_Sector in smartctl output.
        Note which drive label it is (MediaA–K) so the physical caddy can be identified.

      SCENARIO: drive REMOUNTED READ-ONLY
        Filesystem detected errors and self-protected. Highly likely hardware failure.
        Report SMART status. Note that data may be recoverable via snapraid fix.

      SCENARIO: /Volumes/Media (mergerfs) not mounted but member drives are fine
        The mergerfs FUSE process may have crashed. Report — a manual remount or
        reboot is needed; do not attempt to remount automatically.
    allowed_tools:
      - "Bash(df -h /Volumes/Media*)"
      - "Bash(dmesg | tail -30)"
      - "Bash(cat /proc/mounts)"
      - "Bash(sudo smartctl -H /dev/disk/by-id/*)"

  check_snapraid_freshness:
    risk: high
    goal: |
      Diagnose why SnapRAID sync has not run recently. Read-only — do not run
      sync, scrub, or any snapraid write operation.

      SCENARIO: log shows sync ran but took longer than expected / timed out
        Report the runtime and how many files were changed. A very large sync
        (100k+ files changed) is normal after a big download day; not a problem.

      SCENARIO: log shows sync failed with "Content file has changed"
        Another process modified the content file mid-sync (rare). Report — a
        manual sync is needed to resolve.

      SCENARIO: log shows disk error during sync
        A drive may be failing. Note which drive and report SMART status if visible
        in the log. This warrants immediate attention.

      SCENARIO: log shows sync never started (no recent entry at all)
        The cron job itself may have failed to launch. Check if willflix-cron ran
        (look at /var/tmp/willflix-monitors/snapraid_daily timestamp vs expected
        schedule). Could be a cron daemon issue or the server was down during the
        scheduled window.
    allowed_tools:
      - "Bash(sudo snapraid status)"
      - "Bash(cat /willflix/log/snapraid_daily.log)"
      - "Bash(cat /willflix/log/snapraid_weekly.log)"
