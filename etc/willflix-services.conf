# willflix-services.conf — unified service monitoring allowlist.
# Used by bin/cron/willflix-check-services.
#
# type: docker | systemd | both
# tier: critical | warning | info | ignore
#
# Optional:
#   systemd: <unit-name>   (override when unit name differs from <name>.service)
#   upgrade: false         (skip nightly auto-upgrade via update_containers)

services:
  # --- critical: pushover emergency ---
  traefik:
    type: docker
    tier: critical
    upgrade: false  # pinned to v2.10, major version upgrades need manual review
  authentik-server:
    type: docker
    tier: critical
  authentik-worker:
    type: docker
    tier: critical
  smtp-relay:
    type: docker
    tier: critical
  plex:
    type: docker
    tier: critical

  # --- warning: pushover normal ---
  ddclient:
    type: docker
    tier: warning
  vpn:
    type: docker
    tier: warning
  qbittorrent:
    type: docker
    tier: warning
  plex-autoscan:
    type: docker
    tier: warning
  nzbget:
    type: docker
    tier: warning
  sonarr:
    type: docker
    tier: warning
  radarr:
    type: docker
    tier: warning
  lidarr:
    type: docker
    tier: warning
  prowlarr:
    type: docker
    tier: warning
  calibre-web-automated:
    type: docker
    tier: warning
  shelfmark:
    type: docker
    tier: warning
  jdownloader:
    type: docker
    tier: warning
  audiobookshelf:
    type: docker
    tier: warning
  openclaw-node:
    type: docker
    tier: warning
  redis:
    type: docker
    tier: warning
  postgres:
    type: docker
    tier: warning

  # --- info: email only ---
  healthbot:
    type: docker
    tier: info
  nextcloud:
    type: docker
    tier: info
    upgrade: false  # stuck on v31, needs stepped upgrade (v31→v32→v33)
  nginx-public:
    type: docker
    tier: info
  nginx-private:
    type: docker
    tier: info
  tautulli:
    type: docker
    tier: info
  samba:
    type: docker
    tier: info
  health-server:
    type: docker
    tier: info

  # --- ignore: documented but not checked ---
  calibre:
    type: docker
    tier: ignore
  whoami:
    type: docker
    tier: ignore
  adminer:
    type: docker
    tier: ignore
  webhook-handler:
    type: docker
    tier: ignore
  lazylibrarian:
    type: docker
    tier: ignore
  homarr:
    type: docker
    tier: ignore
  grocerybot:
    type: docker
    tier: ignore
  homebot:
    type: docker
    tier: ignore
  gastown:
    type: docker
    tier: ignore
  guildmaster:
    type: docker
    tier: ignore
  overseerr:
    type: docker
    tier: ignore
  copyparty:
    type: docker
    tier: ignore
  byparr:
    type: docker
    tier: ignore
