# zfs-snapshot.conf — datasets snapshotted by bin/cron/zfs-snapshot.
#
# Snapshots are recursive (-r), so children (e.g. rpool/willflix/postgres) are
# included automatically. Missing datasets are skipped, so this is safe before the
# willflix/plex migrations. Retention (keep count) is passed per-frequency from the
# crontab, e.g.  `willflix-cron zfs-snapshot daily 14`.

DATASETS=(
    rpool/willflix          # /willflix — docker appdata + configs (+ postgres child)
    rpool/USERDATA          # /home + /root userdata (recursive; suffix-independent)
    # rpool/plex            # uncomment after Plex data is migrated onto the NVMe
)
