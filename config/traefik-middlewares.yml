http:
  middlewares:
    authentik-forward:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-authentik-username"
          - "X-authentik-groups"
          - "X-authentik-email"
          - "X-authentik-name"
          - "X-authentik-uid"
          - "Authorization"
          - "X-Original-URL"
          - "X-Forwarded-Proto"
          - "X-Forwarded-Host"

  # Host services (non-Docker)
  services:
    opencode:
      loadBalancer:
        servers:
          - url: "http://172.30.0.1:3456"

  routers:
    opencode:
      rule: "Host(`code.willflix.org`)"
      entryPoints:
        - websecure
      service: opencode
      middlewares:
        - authentik-forward
      tls:
        certResolver: le
