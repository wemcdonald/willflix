http:
  middlewares:
    authentik-forward:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-authentik-username" 
          - "X-authentik-groups"
          - "X-authentik-email"
          - "X-authentik-name"
          - "X-authentik-uid"
          - "Authorization"
          - "X-Original-URL"
          - "X-Forwarded-Proto"
          - "X-Forwarded-Host"
