version: '3.8'

secrets:
  restic_password:
    file: ./secrets/restic_password
  authentik_secret_key:
    file: ./secrets/authentik_secret_key
  authentik_postgres_password:
    file: ./secrets/authentik_postgres_password
  openvpn_password:
    file: ./secrets/openvpn_password
  vnc_password:
    file: ./secrets/vnc_password
  smtp_password:
    file: ./secrets/smtp_password
  postgres_password:
    file: ./secrets/postgres_password

services:
  backup:
    image: mazzolino/restic
    hostname: docker
    restart: unless-stopped
    container_name: restic-backup
    volumes:
      - /home/will/.config/rclone:/root/.config/rclone
      - /Volumes/Bonus1/lafayette:/Volumes/Bonus1/lafayette
      - /home/will/server-config:/home/will/server-config
    secrets:
      - restic_password
    environment:
      RUN_ON_STARTUP: "true"
      BACKUP_CRON: "0 30 3 * * *"
      RESTIC_REPOSITORY: /Volumes/Bonus1/lafayette
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      RESTIC_BACKUP_SOURCES: /home/will/server-config
      RESTIC_COMPRESSION: max
      RESTIC_PACK_SIZE: 64
      RESTIC_BACKUP_ARGS: >-
        --exclude /docker/.git
        --exclude /srv/mysql/data
        --exclude *.gz
        --no-scan
        --cleanup-cache
      RESTIC_FORGET_ARGS: >-
        --keep-last 10
        --keep-daily 7
        --keep-weekly 8
        --keep-monthly 24
      TZ: America/Los_Angeles

  traefik:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"
      - "--providers.docker.network=traefik_public"
      - "--providers.file.filename=/config/traefik-middlewares.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=wemcdonald@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpChallenge.entryPoint=web"
      - "--log.level=DEBUG"
      - "--accesslog=true"

      #- "traefik.enable=true"
      #- "traefik.http.routers.dashboard.rule=Host(`traefik.willflix.org`)"
      #- "traefik.http.routers.dashboard.service=api@internal"
      #- "traefik.http.routers.dashboard.entrypoints=websecure"
      #- "traefik.http.routers.dashboard.tls.certresolver=le"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/appdata/letsencrypt:/letsencrypt
      - /docker/config:/config
    networks:
      - traefik_public

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.6.4
    command: server
    restart: unless-stopped
    env_file:
      - secrets/authentik_env
    volumes:
      - /docker/appdata/authentik/certs:/certs
      - /docker/appdata/authentik/media:/media
      - /docker/appdata/authentik/templates:/templates
    #env_file:
    #  - .env
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - postgres
      - redis
    networks:
      - traefik_public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.willflix.org`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=le"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.docker.network=config_traefik_public"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.6.4
    command: worker
    user: root
    restart: unless-stopped
    env_file:
      - secrets/authentik_env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/appdata/authentik/certs:/certs
      - /docker/appdata/authentik/media:/media
      - /docker/appdata/authentik/templates:/templates
    #env_file:
    #  - .env
    depends_on:
      - postgres
      - redis
    networks:
      - traefik_public
      - default

  whoami:
    image: traefik/whoami
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.willflix.org`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=le"
      #- "traefik.http.routers.whoami.middlewares=authentik-forward@docker"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
      - "traefik.http.middlewares.authentik-forward.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-forward.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik-forward.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"

  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    # line above must be uncommented to allow external containers to connect.
    # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/connect-a-container-to-gluetun.md#external-container-to-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8967:8967/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
      - 6881:6881
    secrets:
      - openvpn_password
    environment:
      # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_SERVICE_PROVIDER=privado
      - OPENVPN_USER=twzjmvquku
      - OPENVPN_PASSWORD_FILE=/run/secrets/openvpn_password
      - SERVER_COUNTRIES=United States
      - FIREWALL_VPN_INPUT_PORTS=6881
      # Wireguard:
      # - WIREGUARD_PRIVATE_KEY=wOEI9rqqbDwnN8/Bpp22sVz48T71vJ4fYmFWujulwUU=
      # - WIREGUARD_ADDRESSES=10.64.222.21/32
      # Timezone for accurate log times
      - TZ=America/Los_Angeles
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=
    restart: always
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.bittorrent.loadbalancer.server.port=8967"
      - "traefik.http.routers.bittorrent.rule=Host(`bittorrent.willflix.org`)"
      - "traefik.http.routers.bittorrent.entrypoints=websecure"
      - "traefik.http.routers.bittorrent.tls.certresolver=le"
      - "traefik.http.routers.bittorrent.middlewares=authentik-forward@file"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:vpn"
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8967
      - TORRENTING_PORT=6881
    volumes:
      - /docker/appdata/qBittorrent:/config/qBittorrent
      - /Volumes/Media:/Volumes/Media
    depends_on:
      - vpn

  vnc:
    #image: carlonluca/vnc-desktop:noble-xfce
    build:
      context: /home/will/code/docker-vnc-desktop/lxqt
      dockerfile: Dockerfile_noble
    image: docker-vnc-desktop:local
    container_name: vnc
    ports:
      - 5900:5900
    volumes:
      - /docker/appdata/vnc:/home/will
      - /Volumes/Media:/Volumes/Media
    secrets:
      - vnc_password
    environment:
      - RESOLUTION=1920x1080
      - USER=will
      - PASSWORD_FILE=/run/secrets/vnc_password
      - VNC_PASSWORD_FILE=/run/secrets/vnc_password

  smtp-relay:
    image: juanluisbaptiste/postfix:latest
    container_name: smtp-relay
    secrets:
      - smtp_password
    environment:
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=wemcdonald@gmail.com
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - SERVER_HOSTNAME=willflix.org
    ports:
      - 25:25
    restart: unless-stopped
    volumes:
      - /docker/appdata/smtp-relay/logs:/var/log

  redis:
    image: redis:latest
    restart: always
    ports:
      - 6379:6379
    volumes:
      - /docker/appdata/redis:/data
    command: redis-server --appendonly yes # Example: enable AOF persistence
    #environment:
      #REDIS_PASSWORD: your_strong_password # Set a password for Redis


  postgres:
    image: postgres:17
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    user: 129:135
    ports:
      - 5432:5432
    volumes:
      - /docker/appdata/postgres/data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    environment:
      - POSTGRES_USER=will
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=will
      - PGDATA=/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 48080:8080

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles  # Update to your timezone
    volumes:
      - /docker/appdata/sonarr:/config
      - /Volumes/Media:/Volumes/Media  # Update paths
    ports:
      - 8989:8989
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.willflix.org`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=le"
      - "traefik.http.routers.sonarr.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=122
      - PGID=129  
      - TZ=America/Los_Angeles
    volumes:
      - /docker/appdata/radarr:/config
      - /Volumes/Media:/Volumes/Media
    ports:
      - 7878:7878
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.willflix.org`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=le"
      - "traefik.http.routers.radarr.middlewares=authentik-forward@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      - traefik_public

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
    volumes:
      - /docker/appdata/nzbget:/config
      - /Volumes/Media:/Volumes/Media
    ports:
      - 6789:6789
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.nzbget.loadbalancer.server.port=6789"
      - "traefik.http.routers.nzbget.rule=Host(`nzbget.willflix.org`)"
      - "traefik.http.routers.nzbget.entrypoints=websecure"
      - "traefik.http.routers.nzbget.tls.certresolver=le"
      - "traefik.http.routers.nzbget.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  jdownloader:
    image: jlesage/jdownloader-2
    ports:
      - 5800:5800
      #- 5900:5900 # VNC access
      #- 3129:3129 # mobile applications and browser extensions
    volumes:
      - /docker/appdata/jdownloader:/config
      - /Volumes/MediaK/Downloads/jdownload:/download
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.jdownloader.loadbalancer.server.port=5800"
      - "traefik.http.routers.jdownloader.rule=Host(`jdownloader.willflix.org`)"
      - "traefik.http.routers.jdownloader.entrypoints=websecure"
      - "traefik.http.routers.jdownloader.tls.certresolver=le"
      - "traefik.http.routers.jdownloader.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - AUDIOBOOKSHELF_UID=122
      - AUDIOBOOKSHELF_GID=129
    volumes:
      - /docker/appdata/audiobookshelf/config:/config
      - /docker/appdata/audiobookshelf/metadata:/metadata
      - /Volumes/Media:/Volumes/Media
    ports:
      - 13378:80
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.audiobooks.loadbalancer.server.port=13378"
      - "traefik.http.routers.audiobooks.rule=Host(`audiobooks.willflix.org`)"
      - "traefik.http.routers.audiobooks.entrypoints=websecure"
      - "traefik.http.routers.audiobooks.tls.certresolver=le"
      #- "traefik.http.routers.audiobooks.middlewares=authentik-forward@docker"
    networks:
      - traefik_public


  # Backup
#  calibre:
#    image: lscr.io/linuxserver/calibre:latest
#    container_name: calibre
#    security_opt:
#      - seccomp:unconfined #optional
#    environment:
#      - PUID=501
#      - PGID=501
#      - TZ=America/Los_Angeles
#      - PASSWORD= #optional
#      - CLI_ARGS= #optional
#    volumes:
#      - /Volumes/Media/Calibre:/config
#    ports:
#      - 8080:8080
#      - 8181:8181
#      - 8081:8081
#    restart: unless-stopped

  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web-automated
    environment:
      - PUID=501
      - PGID=501
      - TZ=America/Los_Angeles
    volumes:
      - /docker/appdata/calibre-web-automated:/config
      - /docker/appdata/calibre-ingest:/cwa-book-ingest
      - /Volumes/Media/Calibre:/calibre-library
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"
      - "traefik.http.routers.calibre-web.rule=Host(`books.willflix.org`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=le"
      - "traefik.http.routers.calibre-web.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  nextcloud:
    image: nextcloud
    restart: always
    #user: www-data
    ports:
      - 8020:80
    depends_on:
      - redis
      - postgres
    volumes:
      - /docker/appdata/nextcloud:/var/www/html
    environment:
      - POSTGRES_PASSWORD=nextcloud
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
      - VERSION=docker
      - PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR=/Volumes/Plex
        #- PLEX_CLAIM=claim-Vczyc6sjKDVuZQPtr-zZ
    volumes:
      - /Volumes/Plex:/Volumes/Plex
      - /Volumes/PlexTranscode:/Volumes/PlexTranscode
      - /Volumes/Media/TV:/Volumes/Media/TV
      - /Volumes/Media/Movies:/Volumes/Media/Movies
      - /Volumes/Media/KidsMovies:/Volumes/Media/KidsMovies
      - /Volumes/Media/KidsTV:/Volumes/Media/KidsTV
      - /Volumes/Media/TV4K:/Volumes/Media/TV4K
      - /Volumes/Media/Movies4K:/Volumes/Media/Movies4K
      - /Volumes/Media/CalibreAudiobooks:/Volumes/Media/CalibreAudiobooks
    restart: unless-stopped

networks:
  traefik_public:
    name: config_traefik_public
    external: true
  default:
    name: config_default
    external: true
