  homebot:
    build:
      context: /home/will/code/homebot
      dockerfile: Dockerfile
    container_name: homebot
    restart: unless-stopped
    
    # Environment configuration using secrets
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_bot_token
      - TELEGRAM_API_HASH_FILE=/run/secrets/telegram_api_hash
      - TELEGRAM_API_ID_FILE=/run/secrets/telegram_api_id
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      - RADARR_URL=http://radarr:7878
      - SONARR_URL=http://sonarr:8989
      - RADARR_API_KEY_FILE=/run/secrets/radarr_api_key
      - SONARR_API_KEY_FILE=/run/secrets/sonarr_api_key
      - CLAUDE_CODE_WORKING_DIR=/app
      - CLAUDE_CODE_MAX_TURNS=10
      - ALLOWED_TOOLS=Read,Write,Bash,WebSearch,Glob,Grep
      - CONTEXT_CLEANUP_MINUTES=30
      - MAX_FILE_SIZE_MB=20
      - TEMP_FILES_DIR=/tmp/attachments
      - ATTACHMENTS_DIR=/app/attachments
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - LOG_ROTATION=daily
      - LOG_RETENTION_DAYS=30
      - LOG_PER_USER=false
      - ENABLE_SUB_AGENTS=true
      - ENABLE_FILE_PROCESSING=true
      - ENABLE_CONVERSATION_LOGGING=true
      - DEBUG_ECHO=false
    
    # Secrets
    secrets:
      - telegram_bot_token
      - telegram_api_hash
      - telegram_api_id
      - anthropic_api_key
      - radarr_api_key
      - sonarr_api_key
    
    # Volume mounts
    volumes:
      # Agent configurations (read-only from appdata)
      - /willflix/docker/appdata/homebot/agents:/app/agents:ro
      
      # Logs directory (persistent)
      - /willflix/docker/appdata/homebot/logs:/app/logs
      
      # Session data (persistent)
      - homebot_sessions:/app/sessions
      
      # Temporary files (cleaned on restart)
      - homebot_temp:/app/temp
      
      # Attachments directory
      - /willflix/docker/appdata/homebot/attachments:/app/attachments
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/sessions/health') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - homebot_network
      - traefik_public

