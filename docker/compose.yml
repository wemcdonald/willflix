version: '3.8'

secrets:
  restic_password:
    file: ./secrets/restic_password
  authentik_secret_key:
    file: ./secrets/authentik_secret_key
  authentik_postgres_password:
    file: ./secrets/authentik_postgres_password
  openvpn_password:
    file: ./secrets/openvpn_password
  vnc_password:
    file: ./secrets/vnc_password
  smtp_password:
    file: ./secrets/smtp_password
  postgres_password:
    file: ./secrets/postgres_password
  nextcloud_postgres_password:
    file: ./secrets/nextcloud_postgres_password
  homarr_encryption_key:
    file: ./secrets/homarr_encryption_key
  grocerybot_openai_key:
    file: ./secrets/grocerybot_openai_key
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  telegram_api_hash:
    file: ./secrets/telegram_api_hash
  telegram_api_id:
    file: ./secrets/telegram_api_id
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  radarr_api_key:
    file: ./secrets/radarr_api_key
  sonarr_api_key:
    file: ./secrets/sonarr_api_key
  gemini_api_key:
    file: ./secrets/gemini_api_key
  supabase_url:
    file: ./secrets/supabase_url
  supabase_anon_key:
    file: ./secrets/supabase_anon_key
  supabase_service_role_key:
    file: ./secrets/supabase_service_role_key
  supabase_jwt_secret:
    file: ./secrets/supabase_jwt_secret
  openclaw_gateway_token:
    file: ./secrets/openclaw_gateway_token

services:
  # backup: retired — replaced by host-based bin/cron/backup_restic
  # which backs up root SSD + Plex SSD + irreplaceable media to Bonus1 + B2

  traefik:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.watch=true"
      - "--providers.docker.network=traefik_public"
      - "--providers.file.filename=/config/traefik-middlewares.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=wemcdonald@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpChallenge.entryPoint=web"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--experimental.plugins.rewritebody.modulename=github.com/traefik/plugin-rewritebody"
      - "--experimental.plugins.rewritebody.version=v0.3.1"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /willflix/docker/appdata/letsencrypt:/letsencrypt
      - /willflix/docker:/config
    networks:
      - traefik_public

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.6.4
    command: server
    restart: unless-stopped
    env_file:
      - /willflix/secrets/authentik_env
    environment:
      - AUTHENTIK_EMAIL__HOST=smtp-relay
      - AUTHENTIK_EMAIL__PORT=25
      - AUTHENTIK_EMAIL__USE_TLS=false
      - AUTHENTIK_EMAIL__USE_SSL=false
      - AUTHENTIK_EMAIL__FROM=noreply@willflix.org
      - AUTHENTIK_COOKIE_SAMESITE=Lax
      - AUTHENTIK_COOKIE_SECURE=true
      #- AUTHENTIK_LOG_LEVEL=trace
        #- AUTHENTIK_SESSION_COOKIE_HTTPONLY=false
        #- AUTHENTIK_DISABLE_SESSION_EXPIRY_REFRESH=false
      - AUTHENTIK_COOKIE_DOMAIN=.willflix.org
    volumes:
      - /willflix/docker/appdata/authentik/certs:/certs
      - /willflix/docker/appdata/authentik/media:/media
      - /willflix/docker/appdata/authentik/templates:/templates
    #env_file:
    #  - .env
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      - postgres
      - redis
    networks:
      - traefik_public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.willflix.org`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=le"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.docker.network=config_traefik_public"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-group,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.6.4
    command: worker
    user: root
    restart: unless-stopped
    env_file:
      - /willflix/secrets/authentik_env
    environment:
      - AUTHENTIK_EMAIL__HOST=smtp-relay
      - AUTHENTIK_EMAIL__PORT=25
      - AUTHENTIK_EMAIL__USE_TLS=false
      - AUTHENTIK_EMAIL__USE_SSL=false
      - AUTHENTIK_EMAIL__FROM=noreply@willflix.org
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /willflix/docker/appdata/authentik/certs:/certs
      - /willflix/docker/appdata/authentik/media:/media
      - /willflix/docker/appdata/authentik/templates:/templates
    #env_file:
    #  - .env
    depends_on:
      - postgres
      - redis
    networks:
      - traefik_public
      - default

  whoami:
    image: traefik/whoami
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.willflix.org`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=le"
      - "traefik.http.routers.whoami.middlewares=authentik-forward"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
      - "traefik.http.middlewares.authentik-forward.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-forward.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik-forward.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-Authentik-groups,X-authentik-group"

  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    # line above must be uncommented to allow external containers to connect.
    # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/connect-a-container-to-gluetun.md#external-container-to-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8967:8967/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
      - 6881:6881
    secrets:
      - openvpn_password
    environment:
      # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_SERVICE_PROVIDER=privado
      - OPENVPN_USER=twzjmvquku
      - OPENVPN_PASSWORD_FILE=/run/secrets/openvpn_password
      - SERVER_COUNTRIES=USA
      - FIREWALL_VPN_INPUT_PORTS=6881
      # Wireguard:
      # - WIREGUARD_PRIVATE_KEY=wOEI9rqqbDwnN8/Bpp22sVz48T71vJ4fYmFWujulwUU=
      # - WIREGUARD_ADDRESSES=10.64.222.21/32
      # Timezone for accurate log times
      - TZ=America/Los_Angeles
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=
    restart: always
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.bittorrent.loadbalancer.server.port=8967"
      - "traefik.http.routers.bittorrent.rule=Host(`bittorrent.willflix.org`)"
      - "traefik.http.routers.bittorrent.entrypoints=websecure"
      - "traefik.http.routers.bittorrent.tls.certresolver=le"
      - "traefik.http.routers.bittorrent.middlewares=authentik-forward@file"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:vpn"
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8967
      - TORRENTING_PORT=6881
    volumes:
      - /willflix/docker/appdata/qBittorrent:/config/qBittorrent
      - /Volumes/Media:/Volumes/Media
    depends_on:
      - vpn

#  vnc:
#    #image: carlonluca/vnc-desktop:noble-xfce
#    build:
#      context: /home/will/code/docker-vnc-desktop/lxqt
#      dockerfile: Dockerfile_noble
#    image: docker-vnc-desktop:local
#    container_name: vnc
#    ports:
#      - 5900:5900
#    volumes:
#      - /willflix/docker/appdata/vnc:/home/will
#      - /Volumes/Media:/Volumes/Media
#    secrets:
#      - vnc_password
#    environment:
#      - RESOLUTION=1920x1080
#      - USER=will
#      - PASSWORD_FILE=/run/secrets/vnc_password
#      - VNC_PASSWORD_FILE=/run/secrets/vnc_password

  smtp-relay:
    image: juanluisbaptiste/postfix:latest
    container_name: smtp-relay
    secrets:
      - smtp_password
    environment:
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=wemcdonald@gmail.com
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - SERVER_HOSTNAME=willflix.org
    ports:
      - 25:25
    restart: unless-stopped
    volumes:
      - /willflix/docker/appdata/smtp-relay/logs:/var/log
    networks:
      - traefik_public
      - default

  redis:
    image: redis:latest
    restart: always
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - /willflix/docker/appdata/redis:/data
    command: redis-server --appendonly yes # Example: enable AOF persistence
    #environment:
      #REDIS_PASSWORD: your_strong_password # Set a password for Redis


  postgres:
    image: postgres:17
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    # user: 129:135 # 999:999 inside
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - /willflix/docker/appdata/postgres/data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    environment:
      - POSTGRES_USER=will
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=will
      - PGDATA=/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:48080:8080

  plex-autoscan:
    build:
      context: /willflix/docker/images/plex-autoscan
    container_name: plex-autoscan
    environment:
      - PLEX_AUTOSCAN_CONFIG=/config/config.json
    volumes:
      - /willflix/docker/appdata/plex-autoscan/config:/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /Volumes/Media:/Volumes/Media:ro
      - /Volumes/Plex:/Volumes/Plex:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - traefik_public

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles  # Update to your timezone
    volumes:
      - /willflix/docker/appdata/sonarr:/config
      - /Volumes/Media:/Volumes/Media  # Update paths
    ports:
      - 8989:8989
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.willflix.org`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=le"
      - "traefik.http.routers.sonarr.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=122
      - PGID=129  
      - TZ=America/Los_Angeles
    volumes:
      - /willflix/docker/appdata/radarr:/config
      - /Volumes/Media:/Volumes/Media
    ports:
      - 7878:7878
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.willflix.org`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=le"
      - "traefik.http.routers.radarr.middlewares=authentik-forward@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    networks:
      - traefik_public

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
    volumes:
      - /willflix/docker/appdata/lidarr:/config
      - /Volumes/Media:/Volumes/Media
    ports:
      - 8686:8686
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.willflix.org`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls.certresolver=le"
      - "traefik.http.routers.lidarr.middlewares=authentik-forward@file"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    networks:
      - traefik_public

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
    volumes:
      - /willflix/docker/appdata/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.willflix.org`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=le"
      - "traefik.http.routers.prowlarr.middlewares=authentik-forward@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    networks:
      - traefik_public

  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
    volumes:
      - /willflix/docker/appdata/lazylibrarian:/config
      - /Volumes/Media:/Volumes/Media
    ports:
      - 5299:5299
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lazylibrarian.rule=Host(`librarian.willflix.org`)"
      - "traefik.http.routers.lazylibrarian.entrypoints=websecure"
      - "traefik.http.routers.lazylibrarian.tls.certresolver=le"
      - "traefik.http.routers.lazylibrarian.middlewares=authentik-forward@file"
      - "traefik.http.services.lazylibrarian.loadbalancer.server.port=5299"
    networks:
      - traefik_public

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - PUID=122
      - PGID=998
      - TZ=America/Los_Angeles
    env_file:
      - /willflix/secrets/homarr_env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /willflix/docker/appdata/homarr/configs:/app/data/configs
      - /willflix/docker/appdata/homarr/icons:/app/public/icons
      - /willflix/docker/appdata/homarr/data:/data
      - /willflix/docker/appdata/homarr/data:/appdata
    ports:
      - 7575:7575
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`admin.willflix.org`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls.certresolver=le"
      - "traefik.http.routers.homarr.middlewares=authentik-forward@file"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    networks:
      - traefik_public

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=122
      - PGID=129
      - TZ=America/Los_Angeles
    volumes:
      - /willflix/docker/appdata/nzbget:/config
      - /willflix/docker/appdata/nzbget/scripts:/Volumes/Media/Downloads/Nzb/scripts
      - /Volumes/Media:/Volumes/Media
    ports:
      - 6789:6789
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.nzbget.loadbalancer.server.port=6789"
      - "traefik.http.routers.nzbget.rule=Host(`nzbget.willflix.org`)"
      - "traefik.http.routers.nzbget.entrypoints=websecure"
      - "traefik.http.routers.nzbget.tls.certresolver=le"
      - "traefik.http.routers.nzbget.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  jdownloader:
    image: jlesage/jdownloader-2
    environment:
      - USER_ID=122
      - GROUP_ID=129
      - UMASK=002
    ports:
      - 5800:5800
      #- 5900:5900 # VNC access
      #- 3129:3129 # mobile applications and browser extensions
    volumes:
      - /willflix/docker/appdata/jdownloader:/config
      - /Volumes/MediaK/Downloads/jdownload:/download
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.jdownloader.loadbalancer.server.port=5800"
      - "traefik.http.routers.jdownloader.rule=Host(`jdownloader.willflix.org`)"
      - "traefik.http.routers.jdownloader.entrypoints=websecure"
      - "traefik.http.routers.jdownloader.tls.certresolver=le"
      - "traefik.http.routers.jdownloader.middlewares=authentik-forward@file"
    networks:
      - traefik_public

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - AUDIOBOOKSHELF_UID=122
      - AUDIOBOOKSHELF_GID=129
    volumes:
      - /willflix/docker/appdata/audiobookshelf/config:/config
      - /willflix/docker/appdata/audiobookshelf/metadata:/metadata
      - /Volumes/Media:/Volumes/Media
    ports:
      - 13378:80
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
      - "traefik.docker.network=config_traefik_public"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobooks.willflix.org`)"
      - "traefik.http.routers.audiobookshelf.entrypoints=websecure"
      - "traefik.http.routers.audiobookshelf.tls.certresolver=le"
    networks:
      - traefik_public


  # Backup
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    security_opt:
      - seccomp:unconfined #optional
    environment:
      - PUID=501
      - PGID=501
      - TZ=America/Los_Angeles
      - CUSTOM_USER=will
      - PASSWORD=flyingleap
        #- CLI_ARGS= #optional
    volumes:
      - /willflix/docker/appdata/calibre:/config
      - /Volumes/Media/Ebooks/CalibreLibrary:/books
    ports:
      - 58080:8080 
      - 58181:8181 # VNC https://willflix:58181/
      - 58081:8081
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre.rule=Host(`calibre.willflix.org`)"
      - "traefik.http.routers.calibre.entrypoints=websecure"
      - "traefik.http.routers.calibre.tls.certresolver=le"
      - "traefik.http.services.calibre.loadbalancer.server.port=58080"

  calibre-web-automated:
    image: crocodilestick/calibre-web-automated:latest
    container_name: calibre-web-automated
    environment:
      - PUID=501
      - PGID=501
      - TZ=America/Los_Angeles
      - NETWORK_SHARE_MODE=true
    volumes:
      - /willflix/docker/appdata/calibre-web-automated/cwa:/config
      - /Volumes/Media/Ebooks/incoming/:/cwa-book-ingest
      - /Volumes/Media/Ebooks/CalibreLibrary:/calibre-library
      - /willflix/docker/appdata/calibre-web-automated/s6-overlay/s6-rc.d/calibre-content-server:/etc/s6-overlay/s6-rc.d/calibre-content-server
    restart: unless-stopped
    ports:
      - 58080:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.kobo-sync-headers.headers.customrequestheaders.X-Scheme=https"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"
      - "traefik.http.routers.calibre-web.rule=Host(`books.willflix.org`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=le"
      - "traefik.http.routers.calibre-web.middlewares=authentik-forward@file,kobo-sync-headers"
    networks:
      - traefik_public

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - USE_HEADLESS=false
      - TZ=America/Los_Angeles
      - DISPLAY=:99
      - XVFB_DISPLAY=:99
      - XVFB_RES=1920x1080x24
    ports:
      - 8191:8191
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    command: >
      sh -c "
        apt-get update && apt-get install -y xvfb x11-utils &&
        Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
        sleep 2 &&
        python3 main.py
