events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Server for public.willflix.org
    server {
        listen 80;
        server_name public.willflix.org;
        root /usr/share/nginx/html;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Server for logout.willflix.org
    server {
        listen 80;
        server_name logout.willflix.org;

        location / {
            # Serve logout page first
            root /usr/share/nginx/html;
            try_files /logout.html =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Server for stanford.willflix.org
    server {
        listen 80;
        server_name stanford.willflix.org;

        index index.html index.htm;
        root /stanford;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
