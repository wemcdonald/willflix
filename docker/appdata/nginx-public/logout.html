<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing out...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Signing out...</h1>
    <div class="spinner"></div>
    <p>Please wait while we sign you out of all services.</p>
    
    <script>
        // Automatically redirect to Authentik logout after a brief delay
        setTimeout(function() {
            window.location.href = 'https://auth.willflix.org/flows/-/default/invalidation/?next=https://willflix.org';
        }, 1000);
    </script>
</body>
</html>
